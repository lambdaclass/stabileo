name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rust-src

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Clippy
        working-directory: engine
        run: cargo clippy --lib -- -W clippy::all -A clippy::erasing_op

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - uses: taiki-e/install-action@nextest

      - name: Shell benchmarks gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/benchmark_shell/) + test(/benchmark_beam_shell/) + test(/benchmark_plate/) + test(/benchmark_navier/) + test(/benchmark_scordelis/) + test(/benchmark_cantilever/) + test(/benchmark_pinched/) + test(/test_quad_thin_plate/)'

      - name: Shell acceptance gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/acceptance_.*shell/) + test(/acceptance_.*diaphragm/)'

      - name: Constraint benchmarks gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/benchmark_.*constraint/)'

      - name: Sparse shell gates
        working-directory: engine
        run: cargo nextest run --profile ci --test sparse_shell_gates

      - name: Solver invariants gate
        working-directory: engine
        run: cargo nextest run --profile ci --test solver_invariants

      - name: Solver CI coverage gate
        working-directory: engine
        run: cargo nextest run --profile ci --test solver_ci_coverage

      - name: Conditioning adversarial gate
        working-directory: engine
        run: cargo nextest run --profile ci --test conditioning_adversarial

      # Wall-clock timing gates: run single-threaded so elapsed time reflects
      # CPU work, not contention from co-scheduled tests on shared 2-4 vCPU
      # runners. Measuring wall time under parallel execution made these flaky.
      - name: Performance regression gates
        working-directory: engine
        run: cargo nextest run --profile ci --test perf_regression_gates --test-threads 1

      - name: Advanced perf gates
        working-directory: engine
        run: cargo nextest run --profile ci --test perf_regression_advanced --test-threads 1

      - name: k_full overbuild gates
        working-directory: engine
        run: cargo nextest run --profile ci --test kfull_overbuild_gates

      # Exclude wall-clock timing benchmarks and the perf-gate binaries: they
      # are validated in their dedicated single-threaded steps above. Re-running
      # them here under full-suite parallel contention only adds flakiness (the
      # measured wall time balloons with co-scheduled load) without extra coverage.
      - name: Run all tests
        working-directory: engine
        run: cargo nextest run --profile ci -E 'all() - test(harmonic_phase_breakdown) - test(harmonic_modal_vs_direct_timing) - binary(perf_regression_advanced) - binary(perf_regression_gates)'
        timeout-minutes: 20

      - name: Benchmarks compile
        working-directory: engine
        run: cargo bench --no-run

      # Informational only: criterion reports are uploaded as artifacts below.
      # Benchmark wall time on shared runners must not gate CI (same rationale
      # as the single-threaded perf gates above) — slow runners exceeded the
      # timeout with no correctness signal in the failure.
      - name: Run criterion benchmarks (quick)
        working-directory: engine
        run: cargo bench --bench solver_bench --bench assembly_bench --bench workflow_bench -- --sample-size 10 --warm-up-time 1 --measurement-time 3
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload criterion reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: engine/target/criterion
          retention-days: 30
          if-no-files-found: warn

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build WASM engine
        working-directory: engine
        run: wasm-pack build --target web --out-dir ../web/src/lib/wasm --no-opt

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Run web tests
        working-directory: web
        run: npm run test
